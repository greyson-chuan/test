<!DOCTYPE html>
<html>
<head>
  <title>Driver Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #d9d9d9;
      margin: 20px;
    }

    .box {
      background: #e6e6e6;
      border: 2px solid #000;
      padding: 15px;
      margin-bottom: 20px;
    }

    .row {
      display: flex;
      gap: 20px;
    }

    .left {
      width: 45%;
    }

    .right {
      width: 55%;
    }

    label {
      display: inline-block;
      width: 180px;
      margin: 5px 0;
    }

    input[type="text"] {
      padding: 3px;
      width: 200px;
    }

    .title {
      font-weight: bold;
      margin-bottom: 10px;
    }

    .red-note {
      color: red;
      font-size: 12px;
      margin-left: 10px;
    }
  </style>
</head>

<body>

<!-- SEARCH BOX -->
<div class="box">
  <div class="title">Search By</div>

  <div>
    <label>Driver Name:</label>
    <input type="text" value="Lim Lee Ching">
    <span class="red-note">&lt;- Search via driver name</span>
  </div>

  <div>
    <label>Current Carplate:</label>
    <input type="text">
    <span class="red-note">&lt;- or carplate</span>
  </div>

  <div>
    <label>Main Carplate:</label>
    <input type="text">
  </div>

  <div>
    <label>Include Suspended Contract:</label>
    <input type="checkbox">
  </div>
</div>

<!-- LOWER SECTION -->
<div class="row">

  <!-- DRIVER INFO -->
  <div class="box left">
    <div class="title">Driver Information</div>

    <div><label>Driver Name:</label> Lim Lee Ching</div>
    <div><label>Driver NRIC:</label> S1777639H</div>
    <div><label>Payment Type:</label> EDDA</div>
    <div><label>Main Carplate:</label> SNH1767G</div>
    <div><label>Car Model:</label> Toyota Altis Hybrid</div>
    <div><label>Salesperson:</label> Agnes</div>
    <div><label>RM:</label> Agnes</div>
    <div><label>Deposit:</label> 500</div>
  </div>

  <!-- CONTRACT INFO -->
  <div class="box right">
    <div class="title">Contract Information</div>

    <div><label>Contract Name:</label> ER-C-25-09-089R01</div>
    <div><label>Contract Status:</label> Active</div>
    <div><label>Start Date:</label> 26/09/2025</div>
    <div><label>End Date:</label> 25/09/2026</div>
    <div><label>Rental Rate:</label> $87.00</div>
    <div><label>CDW Rate:</label> $12.00</div>
    <div><label>CDW Name:</label> ECDW+</div>
    <div><label>Salesperson:</label> Agnes</div>
    <div><label>RM:</label> Agnes</div>
  </div>

</div>

</body>
</html>
